<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Product Inventory</h4>
        <div class="d-flex gap-2">
            <button class="btn btn-teal-outline" id="btn-import-csv">
                <i class="fas fa-file-import me-2"></i>Bulk Import
            </button>
            <button class="btn btn-teal" data-bs-toggle="modal" data-bs-target="#productModal" id="btn-add-product">
                <i class="fas fa-plus me-2"></i>Add Product
            </button>
        </div>
    </div>

    <!-- Stats Row -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
                <div class="d-flex align-items-center">
                    <div class="icon-circle bg-primary-subtle text-primary me-3">
                        <i class="fas fa-boxes"></i>
                    </div>
                    <div>
                        <small class="text-muted d-block">Total Items</small>
                        <h5 class="fw-bold mb-0" id="stat-total-products">0</h5>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
                <div class="d-flex align-items-center">
                    <div class="icon-circle bg-warning-subtle text-warning me-3">
                        <i class="fas fa-cubes"></i>
                    </div>
                    <div>
                        <small class="text-muted d-block">Low Stock</small>
                        <h5 class="fw-bold mb-0" id="stat-low-stock">0</h5>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
                <div class="d-flex align-items-center">
                    <div class="icon-circle bg-danger-subtle text-danger me-3">
                        <i class="fas fa-calendar-xmark"></i>
                    </div>
                    <div>
                        <small class="text-muted d-block">Expired / Near Expiry</small>
                        <h5 class="fw-bold mb-0" id="stat-expired">0</h5>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
                <div class="d-flex align-items-center">
                    <div class="icon-circle bg-success-subtle text-success me-3">
                        <i class="fas fa-money-bill-trend-up"></i>
                    </div>
                    <div>
                        <small class="text-muted d-block">Inventory Value</small>
                        <h5 class="fw-bold mb-0" id="stat-inventory-value">$0.00</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Products Table -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table id="productsTable" class="table table-hover align-middle w-100">
                    <thead class="table-light">
                        <tr>
                            <th>Image</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Brand</th>
                            <th>Price (Buy/Sell)</th>
                            <th>Stock</th>
                            <th>Expiry</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- DataTable Content -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold" id="productModalLabel">Add New Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <form id="productForm">
                    <input type="hidden" name="id" id="product-id">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Product Name</label>
                                    <input type="text" name="name" class="form-control" required placeholder="e.g. Composite Resin A2">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Category</label>
                                    <select name="category_id" id="product-category" class="form-select" required>
                                        <option value="">Select Category</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Brand</label>
                                    <select name="brand_id" id="product-brand" class="form-select" required>
                                        <option value="">Select Brand</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Barcode</label>
                                    <input type="text" name="barcode" class="form-control" placeholder="Scan or enter barcode">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Expiry Date</label>
                                    <input type="date" name="expiry_date" class="form-control">
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Product Image</label>
                            <div class="image-upload-wrapper text-center border rounded-4 p-3 mb-3 bg-light" style="cursor: pointer;" id="imageUploadBtn">
                                <img id="product-img-preview" src="https://via.placeholder.com/150?text=Upload+Image" class="img-fluid rounded mb-2">
                                <p class="small text-muted mb-0">Click to upload image</p>
                                <input type="file" name="image" id="product-image-input" hidden accept="image/*">
                            </div>
                        </div>
                        <hr class="my-3">
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Purchase Price</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" name="purchase_price" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Selling Price</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" name="selling_price" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Current Stock</label>
                            <input type="number" name="stock_qty" class="form-control" value="0" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Min. Stock Level</label>
                            <input type="number" name="min_stock" class="form-control" value="5" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="productForm" class="btn btn-teal px-4">Save Product</button>
            </div>
        </div>
    </div>
</div>
