<div class="row g-4 h-100">
    <!-- Left Pane: Product Search & Grid -->
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body p-4 d-flex flex-column">
                <!-- Search & Filters -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="search-box w-100">
                            <i class="fas fa-search"></i>
                            <input type="text" id="pos-search" class="form-control" placeholder="Search by name, barcode or category...">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <select id="pos-category-filter" class="form-select rounded-pill bg-light border-0">
                            <option value="">All Categories</option>
                        </select>
                    </div>
                </div>

                <!-- Product Grid -->
                <div id="pos-product-grid" class="row g-3 overflow-auto flex-grow-1 px-1" style="max-height: 65vh;">
                    <!-- Loading Skeleton -->
                    <div class="col-md-4 col-xl-3 pos-skeleton">
                        <div class="skeleton h-100 rounded-4" style="height: 180px;"></div>
                    </div>
                    <!-- Repeated Skeletons -->
                    <div class="col-md-4 col-xl-3 pos-skeleton"><div class="skeleton h-100 rounded-4" style="height: 180px;"></div></div>
                    <div class="col-md-4 col-xl-3 pos-skeleton"><div class="skeleton h-100 rounded-4" style="height: 180px;"></div></div>
                    <div class="col-md-4 col-xl-3 pos-skeleton"><div class="skeleton h-100 rounded-4" style="height: 180px;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Pane: Shopping Cart -->
    <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 h-100">
            <div class="card-body p-4 d-flex flex-column">
                <!-- Customer Selection Section -->
                <div class="customer-selection d-flex align-items-center mb-3 p-3 bg-light rounded-4">
                    <div class="flex-grow-1">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-1">Customer</label>
                        <h6 class="mb-0 fw-bold" id="pos-selected-customer-name">Walking Customer</h6>
                        <small class="text-muted" id="pos-selected-customer-phone"></small>
                    </div>
                    <button class="btn btn-sm btn-outline-teal rounded-pill" data-bs-toggle="modal" data-bs-target="#posCustomerModal">
                        <i class="fas fa-user-plus me-1"></i>Change
                    </button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">Current Order</h5>
                    <button class="btn btn-sm btn-light text-danger" id="btn-clear-cart">
                        <i class="fas fa-trash-alt me-2"></i>Clear
                    </button>
                </div>

                <!-- Cart Items List -->
                <div id="pos-cart-items" class="flex-grow-1 overflow-auto mb-4" style="max-height: 40vh;">
                    <div class="text-center py-5 text-muted">
                        <i class="fas fa-shopping-basket display-1 mb-3 opacity-25"></i>
                        <p>Cart is empty</p>
                    </div>
                </div>

                <!-- Totals & Payment -->
                <div class="border-top pt-4">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Subtotal</span>
                        <span class="fw-bold" id="cart-subtotal">0.00 <span class="currency-symbol">$</span></span>
                    </div>
                    <div class="row g-2 mb-2 align-items-center">
                        <div class="col-6">
                            <span class="text-muted">Discount</span>
                        </div>
                        <div class="col-6">
                            <div class="input-group input-group-sm">
                                <input type="number" id="cart-discount" class="form-control text-end" value="0">
                                <span class="input-group-text">%</span>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Tax (VAT <span id="vat-rate-display">15</span>%)</span>
                        <span class="fw-bold" id="cart-tax">0.00 <span class="currency-symbol">$</span></span>
                    </div>
                    <div class="d-flex justify-content-between mb-4 mt-2">
                        <h4 class="fw-bold mb-0 text-navy">Total</h4>
                        <h4 class="fw-bold mb-0 text-teal" id="cart-total">0.00 <span class="currency-symbol">$</span></h4>
                    </div>

                    <!-- Payment Section -->
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Payment Method</label>
                        <div class="row g-2">
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="payment-method" id="pay-cash" value="Cash" checked>
                                <label class="btn btn-outline-secondary w-100 py-3" for="pay-cash">
                                    <i class="fas fa-money-bill-wave d-block mb-1"></i> Cash
                                </label>
                            </div>
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="payment-method" id="pay-card" value="Card">
                                <label class="btn btn-outline-secondary w-100 py-3" for="pay-card">
                                    <i class="fas fa-credit-card d-block mb-1"></i> Card
                                </label>
                            </div>
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="payment-method" id="pay-ins" value="Insurance">
                                <label class="btn btn-outline-secondary w-100 py-3" for="pay-ins">
                                    <i class="fas fa-file-medical d-block mb-1"></i> Insure
                                </label>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-teal w-100 py-3 fw-bold shadow-sm" id="btn-checkout">
                        <i class="fas fa-check-circle me-2"></i>COMPLETE SALE
                    </button>
                    
                    <div class="row g-2 mt-2">
                        <div class="col-6">
                            <button class="btn btn-light w-100 py-2 small" id="btn-hold-sale">
                                <i class="fas fa-pause me-2"></i>Hold Sale
                            </button>
                        </div>
                        <div class="col-6">
                            <button class="btn btn-light w-100 py-2 small">
                                <i class="fas fa-receipt me-2"></i>Recent
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Customer Selection Modal -->
<div class="modal fade" id="posCustomerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header border-0 p-4">
                <h5 class="modal-title fw-bold">Select Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <p class="text-muted small">Search registered customers or leave empty for walking customer.</p>
                <div class="search-box mb-4 w-100">
                    <i class="fas fa-search"></i>
                    <input type="text" id="pos-customer-search" class="form-control" placeholder="Search by name or phone...">
                </div>

                <div id="pos-customer-results" class="overflow-auto" style="max-height: 300px;">
                    <!-- Customer list items will be injected here -->
                    <div class="text-center py-4 text-muted small">
                        Type to search customers...
                    </div>
                </div>

                <div class="border-top pt-3 mt-3 d-flex justify-content-between align-items-center">
                    <button class="btn btn-light rounded-pill px-4" onclick="posModule.selectCustomer(null)">
                        Walking Customer
                    </button>
                    <button class="btn btn-teal rounded-pill px-4" data-bs-dismiss="modal" onclick="App.loadPage('customers')">
                        <i class="fas fa-plus me-1"></i>New
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
