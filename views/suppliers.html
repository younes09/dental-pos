<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Suppliers Management</h4>
        <button class="btn btn-teal" data-bs-toggle="modal" data-bs-target="#supplierModal" id="btn-add-supplier">
            <i class="fas fa-truck-ramp-box me-2"></i>Add Supplier
        </button>
    </div>

    <!-- Suppliers Table -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table id="suppliersTable" class="table table-hover align-middle w-100">
                    <thead class="table-light">
                        <tr>
                            <th>Supplier Name</th>
                            <th>Company</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Total Purchases</th>
                            <th>Current Debt</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- DataTable Content -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Supplier Modal -->
<div class="modal fade" id="supplierModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold" id="supplierModalLabel">Add New Supplier</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <form id="supplierForm">
                    <input type="hidden" name="id" id="supplier-id">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Contact Person</label>
                            <input type="text" name="name" class="form-control" required placeholder="e.g. Jane Smith">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Company Name</label>
                            <input type="text" name="company" class="form-control"
                                placeholder="e.g. Dental Supply Corp">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" placeholder="e.g. +1 555 0123">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" name="email" class="form-control"
                                placeholder="e.g. sales@supplycorp.com">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="supplierForm" class="btn btn-teal px-4">Save Supplier</button>
            </div>
        </div>
    </div>
</div>

<!-- Settle Debt Modal -->
<div class="modal fade" id="settleDebtModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold">Settle Supplier Debt</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <form id="settleDebtForm">
                    <input type="hidden" name="supplier_id" id="debt-supplier-id">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Supplier</label>
                        <input type="text" id="debt-supplier-name" class="form-control bg-light" readonly>
                    </div>
                    <div
                        class="mb-3 bg-danger-subtle text-danger p-3 rounded-3 d-flex justify-content-between align-items-center">
                        <span class="fw-semibold">Current Debt:</span>
                        <h5 class="fw-bold mb-0" id="debt-current-balance">0.00 $</h5>
                    </div>
                    <hr>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Payment Amount <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="number" step="0.01" min="0.01" name="amount" id="debt-payment-amount"
                                    class="form-control" required>
                                <span class="input-group-text currency-symbol">$</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Payment Method</label>
                            <select name="payment_method" class="form-select">
                                <option value="Cash">Cash</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                                <option value="Cheque">Cheque</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Notes / Reference</label>
                            <input type="text" name="notes" class="form-control" placeholder="e.g. Cheque #123456">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="settleDebtForm" class="btn btn-teal px-4 text-white">Record Payment</button>
            </div>
        </div>
    </div>
</div>

<!-- Supplier Products Modal -->
<div class="modal fade" id="supplierProductsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold">Products Provided by <span id="supplierProductsModalTitle" class="text-teal"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <div class="table-responsive">
                    <table id="supplierProductsTable" class="table table-hover align-middle w-100 text-nowrap">
                        <thead class="table-light">
                            <tr>
                                <th>Product Name</th>
                                <th>Barcode</th>
                                <th>Category / Brand</th>
                                <th>Total Supplied Qty</th>
                                <th>Avg Unit Cost</th>
                                <th>Last Purchase Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- DataTable Content -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
