<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Suppliers Management</h4>
        <button class="btn btn-teal" data-bs-toggle="modal" data-bs-target="#supplierModal" id="btn-add-supplier">
            <i class="fas fa-truck-ramp-box me-2"></i>Add Supplier
        </button>
    </div>

    <!-- Suppliers Table -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table id="suppliersTable" class="table table-hover align-middle w-100">
                    <thead class="table-light">
                        <tr>
                            <th>Supplier Name</th>
                            <th>Company</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Outstanding Payables</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- DataTable Content -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Supplier Modal -->
<div class="modal fade" id="supplierModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold" id="supplierModalLabel">Add New Supplier</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <form id="supplierForm">
                    <input type="hidden" name="id" id="supplier-id">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Contact Person</label>
                            <input type="text" name="name" class="form-control" required placeholder="e.g. Jane Smith">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Company Name</label>
                            <input type="text" name="company" class="form-control" placeholder="e.g. Dental Supply Corp">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" placeholder="e.g. +1 555 0123">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="e.g. sales@supplycorp.com">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="supplierForm" class="btn btn-teal px-4">Save Supplier</button>
            </div>
        </div>
    </div>
</div>
