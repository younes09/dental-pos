<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0" data-i18n="equipment.page_title">Equipment Management</h4>
            <p class="text-muted small mb-0" data-i18n="equipment.page_subtitle">Manage your professional assets and tools.</p>
        </div>
        <button class="btn btn-teal px-4" data-bs-toggle="modal" data-bs-target="#equipmentModal" onclick="equipmentModule.resetForm()">
            <i class="fas fa-plus me-2"></i><span data-i18n="equipment.btn.add_equipment">Add Equipment</span>
        </button>
    </div>

    <!-- Stats Row -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3 h-100">
                <div class="d-flex align-items-center">
                    <div class="icon-circle bg-teal-subtle text-teal me-3">
                        <i class="fas fa-tools"></i>
                    </div>
                    <div>
                        <small class="text-muted d-block" data-i18n="equipment.stats.total_items">Total Items</small>
                        <h5 class="fw-bold mb-0" id="totalEquipment">0</h5>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-3 h-100">
                <div class="d-flex align-items-center">
                    <div class="icon-circle bg-info-subtle text-info me-3">
                        <i class="fas fa-dollar-sign"></i>
                    </div>
                    <div>
                        <small class="text-muted d-block" data-i18n="equipment.stats.total_value">Total Value</small>
                        <h5 class="fw-bold mb-0"><span id="totalValue">0.00</span> <span class="currency-symbol">DZD</span></h5>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Table Card -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table id="equipmentTable" class="table table-hover align-middle w-100">
                    <thead class="table-light">
                        <tr>
                            <th data-i18n="equipment.table.id">ID</th>
                            <th data-i18n="equipment.table.name">Name</th>
                            <th data-i18n="equipment.table.price">Purchase Price</th>
                            <th data-i18n="equipment.table.condition">Condition</th>
                            <th data-i18n="equipment.table.quantity">Quantity</th>
                            <th data-i18n="equipment.table.created_at">Created At</th>
                            <th class="text-end" data-i18n="equipment.table.actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Content loaded via AJAX -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Equipment Modal -->
<div class="modal fade" id="equipmentModal" tabindex="-1" aria-labelledby="equipmentModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold" id="equipmentModalLabel" data-i18n="equipment.modal.add_title">Add Equipment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <form id="equipmentForm">
                    <input type="hidden" name="id" id="equipmentId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold small" data-i18n="equipment.modal.name">Equipment Name</label>
                        <input type="text" name="name" id="equipmentName" class="form-control" placeholder="e.g. Office Chair, PC, Counter" required data-i18n="equipment.modal.name_placeholder" data-i18n-target="placeholder">
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold small" data-i18n="equipment.modal.price">Purchase Price</label>
                            <div class="input-group">
                                <input type="number" step="0.01" name="purchase_price" id="equipmentPrice" class="form-control" required>
                                <span class="input-group-text currency-symbol">DZD</span>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold small" data-i18n="equipment.modal.quantity">Quantity</label>
                            <input type="number" name="quantity" id="equipmentQuantity" class="form-control" value="1" min="1" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold small" data-i18n="equipment.modal.condition">Condition</label>
                        <select name="condition_status" id="equipmentCondition" class="form-select" style="cursor: pointer;">
                            <option value="New" data-i18n="equipment.condition.new">New</option>
                            <option value="Good" data-i18n="equipment.condition.good">Good</option>
                            <option value="Fair" data-i18n="equipment.condition.fair">Fair</option>
                            <option value="Poor" data-i18n="equipment.condition.poor">Poor</option>
                            <option value="Needs Repair" data-i18n="equipment.condition.repair">Needs Repair</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal" data-i18n="equipment.modal.btn.cancel">Cancel</button>
                <button type="button" class="btn btn-teal px-4" onclick="equipmentModule.save()">
                    <i class="fas fa-save me-2"></i><span data-i18n="equipment.modal.btn.save">Save Equipment</span>
                </button>
            </div>
        </div>
    </div>
</div>
