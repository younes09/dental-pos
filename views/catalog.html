<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Catalog Management</h4>
    </div>

    <div class="row g-4">
        <!-- Categories Section -->
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-transparent border-0 p-4 pb-0 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0"><i class="fas fa-tags me-2 text-teal"></i>Categories</h5>
                    <button class="btn btn-sm btn-teal" onclick="catalogModule.openModal('categories')">
                        <i class="fas fa-plus me-1"></i>Add Category
                    </button>
                </div>
                <div class="card-body p-4">
                    <div class="table-responsive">
                        <table id="categoriesTable" class="table table-hover align-middle w-100">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Category Name</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Brands Section -->
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-transparent border-0 p-4 pb-0 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0"><i class="fas fa-copyright me-2 text-teal"></i>Brands</h5>
                    <button class="btn btn-sm btn-teal" onclick="catalogModule.openModal('brands')">
                        <i class="fas fa-plus me-1"></i>Add Brand
                    </button>
                </div>
                <div class="card-body p-4">
                    <div class="table-responsive">
                        <table id="brandsTable" class="table table-hover align-middle w-100">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Brand Name</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Catalog Modal -->
<div class="modal fade" id="catalogModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold" id="catalogModalLabel">Add New</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <form id="catalogForm">
                    <input type="hidden" name="id" id="catalog-id">
                    <input type="hidden" name="type" id="catalog-type">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" id="catalog-name-label">Name</label>
                        <input type="text" name="name" id="catalog-name" class="form-control" required placeholder="e.g. Diagnostic Tools">
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="catalogForm" class="btn btn-teal px-4">Save Changes</button>
            </div>
        </div>
    </div>
</div>
