<div class="row mb-4 animate__animated animate__fadeIn">
    <div class="col-12 d-flex justify-content-between align-items-center">
        <div>
            <h3 class="fw-bold mb-0">Gestion de la Trésorerie</h3>
            <p class="text-muted small">Suivi des fonds (Coffre, Banque) et historique des mouvements.</p>
        </div>
        <div>
            <button class="btn btn-teal rounded-pill px-4 me-2" onclick="vaultModule.openTransferModal()">
                <i class="fas fa-exchange-alt me-2"></i>Virement Interne
            </button>
            <button class="btn btn-navy rounded-pill px-4" onclick="vaultModule.openAddTransactionModal()">
                <i class="fas fa-plus me-2"></i>Nouvelle Transaction
            </button>
        </div>
    </div>
</div>

<!-- Account Cards -->
<div id="vault-accounts-container" class="row mb-4">
    <!-- Accounts will be loaded here -->
    <div class="col-12 text-center py-5">
        <div class="spinner-border text-teal" role="status"></div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">Historique des Mouvements</h5>
                    <div class="d-flex gap-2">
                        <select id="filter-account" class="form-select form-select-sm rounded-pill" style="width: 200px;" onchange="vaultModule.loadTransactions()">
                            <option value="">Tous les comptes</option>
                        </select>
                        <button class="btn btn-light btn-sm rounded-pill px-3" onclick="vaultModule.loadTransactions()">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table id="vaultTransactionsTable" class="table table-hover align-middle">
                        <thead class="bg-light">
                            <tr>
                                <th>Date</th>
                                <th>Compte</th>
                                <th>Type</th>
                                <th>Description</th>
                                <th class="text-end">Montant</th>
                                <th>Utilisateur</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Transactions will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Add Transaction -->
<div class="modal fade" id="modalAddTransaction" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold">Nouvelle Transaction</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="formAddTransaction">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Compte</label>
                        <select name="account_id" class="form-select rounded-3" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Type de mouvement</label>
                        <select name="type" class="form-select rounded-3" required>
                            <option value="Income">Entrée (Revenu)</option>
                            <option value="Expense">Sortie (Dépense)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Montant</label>
                        <div class="input-group">
                            <input type="number" name="amount" step="0.01" class="form-control rounded-3" placeholder="0.00" required>
                            <span class="input-group-text bg-light border-start-0">DH</span>
                        </div>
                    </div>
                    <div class="mb-0">
                        <label class="form-label small fw-bold">Description / Notes</label>
                        <textarea name="description" class="form-control rounded-3" rows="3" placeholder="Ex: Achat fournitures, Versement..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" class="btn btn-teal rounded-pill px-4">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal: Transfer -->
<div class="modal fade" id="modalTransfer" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold">Virement Interne</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="formTransfer">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Depuis (Source)</label>
                        <select name="from_id" class="form-select rounded-3" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Vers (Destination)</label>
                        <select name="to_id" class="form-select rounded-3" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Montant</label>
                        <div class="input-group">
                            <input type="number" name="amount" step="0.01" class="form-control rounded-3" placeholder="0.00" required>
                            <span class="input-group-text bg-light border-start-0">DH</span>
                        </div>
                    </div>
                    <div class="mb-0">
                        <label class="form-label small fw-bold">Notes</label>
                        <input type="text" name="description" class="form-control rounded-3" placeholder="Ex: Dépôt banque">
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" class="btn btn-teal rounded-pill px-4">Effectuer</button>
                </div>
            </form>
        </div>
    </div>
</div>
