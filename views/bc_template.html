<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Bon de Commande - {{po_id}}</title>
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
            --dark-color: #212529;
            --light-color: #f8f9fa;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--dark-color);
            line-height: 1.5;
            margin: 0;
            padding: 0;
            /* Remove body padding to let container handle it */
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            border: 1px solid #eee;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            background: #fff;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 20px;
        }

        .company-info h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 28px;
        }

        .document-title {
            text-align: right;
        }

        .document-title h2 {
            margin: 0;
            color: var(--secondary-color);
            font-size: 24px;
            text-transform: uppercase;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-section h3 {
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            margin-bottom: 10px;
            font-size: 16px;
            text-transform: uppercase;
            color: var(--secondary-color);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .table th {
            background-color: var(--light-color);
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #ddd;
            font-size: 14px;
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .text-end {
            text-align: right;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 12px;
            color: var(--secondary-color);
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .totals {
            margin-left: auto;
            width: 300px;
        }

        .totals-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }

        .totals-row.grand-total {
            font-weight: bold;
            font-size: 18px;
            border-top: 2px solid var(--primary-color);
            margin-top: 10px;
            padding-top: 10px;
            color: var(--primary-color);
        }

        @media print {
            body {
                padding: 0;
                margin: 0;
            }

            .container {
                box-shadow: none;
                border: none;
                width: 100%;
                max-width: 100%;
                margin: 0;
                padding: 10px;
            }

            .no-print {
                display: none;
            }
        }

        .price-change {
            font-size: 11px;
            color: #d63384;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container" id="printable-content">
        <div class="header">
            <div class="company-info">
                <h1 id="store-name"></h1>
                <p id="store-address"></p>
                <p id="store-phone"></p>
                <p id="store-tax"></p>
            </div>
            <div class="document-title">
                <h2>Bon de Commande</h2>
                <p><strong>N°:</strong> <span id="po-number"></span></p>
                <p><strong>Date:</strong> <span id="po-date"></span></p>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-section">
                <h3>Fournisseur</h3>
                <p><strong id="supplier-name"></strong></p>
                <p id="supplier-company"></p>
                <div id="supplier-contact"></div>
            </div>
            <div class="info-section">
                <h3>Détails</h3>
                <p><strong>Statut:</strong> <span id="po-status">Pending</span></p>
                <p><strong>Paiement:</strong> <span id="po-payment-status">Unpaid</span></p>
            </div>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th style="width: 40%">Produit</th>
                    <th class="text-end">Qté</th>
                    <th class="text-end">Ancien Prix</th>
                    <th class="text-end">Nouveau Prix (.)</th>
                    <th class="text-end">Sous-total</th>
                </tr>
            </thead>
            <tbody id="items-tbody">
                <!-- Items will be inserted here -->
            </tbody>
        </table>

        <div class="totals">
            <div class="totals-row">
                <span>Nombre d'articles:</span>
                <span id="total-items">0</span>
            </div>
            <div class="totals-row grand-total">
                <span>Total Général:</span>
                <span id="grand-total">0.00 DZD</span>
            </div>
        </div>

        <div class="footer">
            <p>Merci pour votre confiance. Ce document est généré par DentalPOS.</p>
        </div>
    </div>

    <div class="no-print" style="text-align: center; margin-top: 20px; padding-bottom: 20px;">
        <button onclick="window.print()"
            style="padding: 10px 20px; cursor: pointer; background: #0d6efd; color: white; border: none; border-radius: 4px;">Imprimer
            le bon</button>
    </div>

    <script>
        function populateBC(data) {
            const { order, items, settings } = data;
            const currency = settings?.currency || 'DZD';

            function formatCurrency(amount) {
                return `${parseFloat(amount).toFixed(2)} ${currency}`;
            }

            // Set Store Info
            document.getElementById('store-name').textContent = settings.store_name || 'DentalPOS';
            document.getElementById('store-address').textContent = settings.address || '';
            document.getElementById('store-phone').textContent = settings.store_phone ? `Tél: ${settings.store_phone}` : '';
            document.getElementById('store-tax').textContent = settings.tax_number ? `VAT: ${settings.tax_number}` : '';

            // Set Order Info
            document.getElementById('po-number').textContent = `#PO-${order.id}`;
            document.getElementById('po-date').textContent = order.date;

            // Set Supplier Info
            document.getElementById('supplier-name').textContent = order.supplier_name;
            document.getElementById('supplier-company').textContent = order.supplier_company || '';

            const supplierContactEl = document.getElementById('supplier-contact');
            if (supplierContactEl) {
                supplierContactEl.innerHTML = `
                    <div><strong>Email:</strong> ${order.supplier_email || 'N/A'}</div>
                    <div><strong>Tél:</strong> ${order.supplier_phone || 'N/A'}</div>
                `;
            }

            document.getElementById('po-status').textContent = order.status;
            document.getElementById('po-payment-status').textContent = order.payment_status;

            // Set Items
            const tbody = document.getElementById('items-tbody');
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td>
                        <strong>${item.product_name}</strong><br>
                        <small>Barcode: ${item.barcode || 'N/A'}</small>
                    </td>
                    <td class="text-end">${item.qty}</td>
                    <td class="text-end">${formatCurrency(item.old_unit_cost)}</td>
                    <td class="text-end" style="border-bottom: 1px dotted #ccc; width: 100px;"></td>
                    <td class="text-end">${formatCurrency(item.qty * item.unit_cost)}</td>
                </tr>
            `).join('');

            // Set Totals
            document.getElementById('total-items').textContent = items.length;
            document.getElementById('grand-total').textContent = formatCurrency(order.total);
        }

        window.addEventListener('message', function (event) {
            if (event.data && event.data.type === 'POPULATE_BC') {
                populateBC(event.data.payload);
            }
        });
    </script>
</body>

</html>
