<div class="container-fluid fade-in">
    <div class="row mb-4">
        <div class="col-md-6">
            <h3 class="fw-bold mb-0" data-i18n="salaries.page_title">Payroll Management</h3>
            <p class="text-muted small" data-i18n="salaries.page_subtitle">Manage your staff and track salary payments.</p>
        </div>
        <div class="col-md-6 text-md-end">
            <button class="btn btn-teal-outline rounded-pill px-4 me-2" data-bs-toggle="modal"
                data-bs-target="#paymentModal">
                <i class="fas fa-money-bill-transfer me-2"></i><span data-i18n="salaries.btn.new_payment">New Payment</span>
            </button>
            <button class="btn btn-teal rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#staffModal">
                <i class="fas fa-plus me-2"></i><span data-i18n="salaries.btn.add_staff">Add Staff</span>
            </button>
        </div>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-pills custom-pills mb-4" id="salaryTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active rounded-pill px-4 me-2" id="staff-tab" data-bs-toggle="tab"
                data-bs-target="#staff-content" type="button" role="tab">
                <i class="fas fa-users me-2"></i><span data-i18n="salaries.tab.staff">Staff</span>
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link rounded-pill px-4" id="payments-tab" data-bs-toggle="tab"
                data-bs-target="#payments-content" type="button" role="tab">
                <i class="fas fa-history me-2"></i><span data-i18n="salaries.tab.history">Payment History</span>
            </button>
        </li>
    </ul>

    <div class="tab-content" id="salaryTabsContent">
        <!-- Staff List Tab -->
        <div class="tab-pane fade show active" id="staff-content" role="tabpanel">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="staffTable">
                            <thead class="bg-light">
                                <tr>
                                    <th data-i18n="salaries.table.name">Name</th>
                                    <th data-i18n="salaries.table.position">Position</th>
                                    <th data-i18n="salaries.table.phone">Phone</th>
                                    <th data-i18n="salaries.table.base_salary">Base Salary</th>
                                    <th data-i18n="salaries.table.status">Status</th>
                                    <th class="text-end" data-i18n="salaries.table.action">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be loaded here via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Payments History Tab -->
        <div class="tab-pane fade" id="payments-content" role="tabpanel">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="paymentsTable">
                            <thead class="bg-light">
                                <tr>
                                    <th data-i18n="salaries.table.date">Date</th>
                                    <th data-i18n="salaries.table.staff">Staff</th>
                                    <th data-i18n="salaries.table.period">Period</th>
                                    <th data-i18n="salaries.table.amount">Amount</th>
                                    <th data-i18n="salaries.table.account">Account</th>
                                    <th data-i18n="salaries.table.method">Method</th>
                                    <th data-i18n="salaries.table.note">Note</th>
                                    <th class="text-end" data-i18n="salaries.table.action">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be loaded here via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Staff Modal -->
<div class="modal fade" id="staffModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold" data-i18n="salaries.modal.staff_title">Staff Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="staffForm">
                <div class="modal-body p-4">
                    <input type="hidden" id="staffId" name="id">
                    <div class="mb-3">
                        <label class="form-label small fw-bold" data-i18n="salaries.modal.full_name">Full Name *</label>
                        <input type="text" class="form-control rounded-3" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold" data-i18n="salaries.modal.position">Position</label>
                        <input type="text" class="form-control rounded-3" name="position"
                            placeholder="Ex: Dental Assistant" data-i18n="salaries.modal.position_placeholder" data-i18n-target="placeholder">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold" data-i18n="salaries.modal.phone">Phone</label>
                            <input type="text" class="form-control rounded-3" name="phone">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold" data-i18n="salaries.modal.email">Email</label>
                            <input type="email" class="form-control rounded-3" name="email">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold" data-i18n="salaries.modal.base_salary">Base Salary</label>
                            <div class="input-group">
                                <input type="number" step="0.01" class="form-control rounded-start-3" name="base_salary"
                                    required>
                                <span
                                    class="input-group-text bg-light border-start-0 rounded-end-3 currency-symbol">DZD</span>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold" data-i18n="salaries.modal.status">Status</label>
                            <select class="form-select rounded-3" name="status">
                                <option value="Active" data-i18n="salaries.modal.status_active">Active</option>
                                <option value="Inactive" data-i18n="salaries.modal.status_inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-0">
                        <label class="form-label small fw-bold" data-i18n="salaries.modal.hiring_date">Hiring Date</label>
                        <input type="date" class="form-control rounded-3" name="hiring_date">
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4"
                        data-bs-dismiss="modal" data-i18n="salaries.modal.btn.cancel">Cancel</button>
                    <button type="submit" class="btn btn-teal rounded-pill px-4" data-i18n="salaries.modal.btn.save">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Payment Modal -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 p-4 pb-0">
                <h5 class="fw-bold" data-i18n="salaries.modal.pay_title">Record a Payment</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="paymentForm">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label small fw-bold" data-i18n="salaries.modal.select_staff">Select Staff Member *</label>
                        <select class="form-select rounded-3" name="staff_id" id="paymentStaffSelect" required>
                            <option value="" data-i18n="salaries.modal.choose">-- Choose --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold" data-i18n="salaries.modal.treasury_account">Treasury Account *</label>
                        <select class="form-select rounded-3" name="vault_account_id" id="paymentVaultSelect" required>
                            <option value="" data-i18n="salaries.modal.choose">-- Choose --</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold" data-i18n="salaries.modal.period_month">Period (Month)</label>
                            <select class="form-select rounded-3" name="period_month" required>
                                <option value="1">January</option>
                                <option value="2">February</option>
                                <option value="3">March</option>
                                <option value="4">April</option>
                                <option value="5">May</option>
                                <option value="6">June</option>
                                <option value="7">July</option>
                                <option value="8">August</option>
                                <option value="9">September</option>
                                <option value="10">October</option>
                                <option value="11">November</option>
                                <option value="12">December</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold" data-i18n="salaries.modal.period_year">Year</label>
                            <input type="number" class="form-control rounded-3" name="period_year" value="2026"
                                required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold" data-i18n="salaries.modal.amount">Amount *</label>
                            <div class="input-group">
                                <input type="number" step="0.01" class="form-control rounded-start-3" name="amount"
                                    id="paymentAmountInput" required>
                                <span
                                    class="input-group-text bg-light border-start-0 rounded-end-3 currency-symbol">DZD</span>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold" data-i18n="salaries.modal.pay_date">Payment Date</label>
                            <input type="date" class="form-control rounded-3" name="payment_date" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold" data-i18n="salaries.modal.pay_method">Payment Method</label>
                        <select class="form-select rounded-3" name="payment_method">
                            <option value="Cash" data-i18n="salaries.modal.method_cash">Cash</option>
                            <option value="Bank Transfer" data-i18n="salaries.modal.method_transfer">Bank Transfer</option>
                            <option value="Cheque" data-i18n="salaries.modal.method_cheque">Cheque</option>
                        </select>
                    </div>
                    <div class="mb-0">
                        <label class="form-label small fw-bold" data-i18n="salaries.modal.comments">Comments (Optional)</label>
                        <textarea class="form-control rounded-3" name="notes" rows="2"
                            placeholder="Additional notes..." data-i18n="salaries.modal.comments_placeholder" data-i18n-target="placeholder"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4"
                        data-bs-dismiss="modal" data-i18n="salaries.modal.btn.cancel">Cancel</button>
                    <button type="submit" class="btn btn-teal rounded-pill px-4" data-i18n="salaries.modal.btn.validate">Validate Payment</button>
                </div>
            </form>
        </div>
    </div>
</div>
