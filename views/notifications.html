<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0" data-i18n="notif.title">Notification History</h4>
            <p class="text-muted small mb-0" data-i18n="notif.subtitle">View all your past and present alerts.</p>
        </div>
        <button class="btn btn-teal-outline px-4" onclick="notificationsModule.markAllAsRead()">
            <i class="fas fa-check-double me-2"></i><span data-i18n="notif.btn_mark_read">Mark All As Read</span>
        </button>
    </div>

    <!-- Table Card -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table id="notificationsTable" class="table table-hover align-middle w-100">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 50px;" data-i18n="notif.th_type">Type</th>
                            <th data-i18n="notif.th_title">Title</th>
                            <th data-i18n="notif.th_msg">Message</th>
                            <th data-i18n="notif.th_status">Status</th>
                            <th data-i18n="notif.th_date">Date</th>
                            <th class="text-end" data-i18n="notif.th_actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Content loaded via AJAX -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
