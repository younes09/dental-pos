<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0" data-i18n="customers.page_title">Customers Management</h4>
        <button class="btn btn-teal" data-bs-toggle="modal" data-bs-target="#customerModal" id="btn-add-customer">
            <i class="fas fa-user-plus me-2"></i><span data-i18n="customers.btn.add_customer">Add Customer</span>
        </button>
    </div>

    <!-- Customers Table -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table id="customersTable" class="table table-hover align-middle w-100">
                    <thead class="table-light">
                        <tr>
                            <th data-i18n="customers.table.name">Customer Name</th>
                            <th data-i18n="customers.table.phone">Phone</th>
                            <th data-i18n="customers.table.email">Email</th>
                            <th data-i18n="customers.table.balance">Outstanding Balance</th>
                            <th data-i18n="customers.table.points">Loyalty Points</th>
                            <th data-i18n="customers.table.last_visit">Last Visit</th>
                            <th data-i18n="customers.table.actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- DataTable Content -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Customer Modal -->
<div class="modal fade" id="customerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold" id="customerModalLabel" data-i18n="customers.modal.add_title">Add New Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <form id="customerForm">
                    <input type="hidden" name="id" id="customer-id">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold" data-i18n="customers.modal.full_name">Full Name</label>
                            <input type="text" name="name" class="form-control" required placeholder="e.g. John Doe" data-i18n="customers.modal.name_placeholder" data-i18n-target="placeholder">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" data-i18n="customers.modal.phone">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" placeholder="e.g. +1 234 567 890" data-i18n="customers.modal.phone_placeholder" data-i18n-target="placeholder">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" data-i18n="customers.modal.email">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="e.g. john@example.com" data-i18n="customers.modal.email_placeholder" data-i18n-target="placeholder">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" data-i18n="customers.modal.initial_balance">Initial Balance</label>
                            <div class="input-group">
                                <input type="number" step="0.01" name="balance" class="form-control" value="0.00">
                                <span class="input-group-text currency-symbol">$</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" data-i18n="customers.modal.loyalty_points">Loyalty Points</label>
                            <input type="number" name="loyalty_points" class="form-control" value="0">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal" data-i18n="customers.modal.btn.cancel">Cancel</button>
                <button type="submit" form="customerForm" class="btn btn-teal px-4" data-i18n="customers.modal.btn.save">Save Customer</button>
            </div>
        </div>
    </div>
</div>

<!-- Purchase History Modal -->
<div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold"><span data-i18n="customers.modal.history_title">Purchase History: </span><span id="historyCustomerName"
                        class="text-teal"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle w-100" id="historyTable">
                        <thead class="table-light">
                            <tr>
                                <th data-i18n="customers.modaltable.date">Date</th>
                                <th data-i18n="customers.modaltable.ref">Ref #</th>
                                <th data-i18n="customers.modaltable.total">Total</th>
                                <th data-i18n="customers.modaltable.payment">Payment</th>
                                <th data-i18n="customers.modaltable.status">Status</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <!-- History items will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Settle Debt Modal -->
<div class="modal fade" id="settleDebtModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold" data-i18n="customers.modal.settle_title">Settle Customer Debt</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <form id="settleDebtForm">
                    <input type="hidden" name="customer_id" id="debt-customer-id">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" data-i18n="customers.modal.customer">Customer</label>
                        <input type="text" id="debt-customer-name" class="form-control bg-light" readonly>
                    </div>
                    <div
                        class="mb-3 bg-danger-subtle text-danger p-3 rounded-3 d-flex justify-content-between align-items-center">
                        <span class="fw-semibold" data-i18n="customers.modal.current_debt">Current Debt:</span>
                        <h5 class="fw-bold mb-0" id="debt-current-balance">0.00 $</h5>
                    </div>
                    <hr>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold"><span data-i18n="customers.modal.payment_amount">Payment Amount</span> <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="number" step="0.01" min="0.01" name="amount" id="debt-payment-amount"
                                    class="form-control" required>
                                <span class="input-group-text currency-symbol">$</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" data-i18n="customers.modal.payment_method">Payment Method</label>
                            <select name="payment_method" class="form-select">
                                <option value="Cash" data-i18n="customers.method.cash">Cash</option>
                                <option value="Bank Transfer" data-i18n="customers.method.transfer">Bank Transfer</option>
                                <option value="Cheque" data-i18n="customers.method.cheque">Cheque</option>
                                <option value="Card" data-i18n="customers.method.card">Card</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold" data-i18n="customers.modal.target_account">Target Account (Treasury)</label>
                            <select name="account_id" id="debt-account-id" class="form-select">
                                <option value="" data-i18n="customers.modal.no_treasury">-- No Treasury Update --</option>
                            </select>
                            <small class="text-muted" data-i18n="customers.modal.target_account_help">Select an account to record this income in the Vault/Bank.</small>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold" data-i18n="customers.modal.notes">Notes / Reference</label>
                            <input type="text" name="notes" class="form-control" placeholder="e.g. Receipt #123456" data-i18n="customers.modal.notes_placeholder" data-i18n-target="placeholder">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal" data-i18n="customers.modal.btn.cancel">Cancel</button>
                <button type="submit" form="settleDebtForm" class="btn btn-teal px-4 text-white" data-i18n="customers.modal.btn.record">Record Payment</button>
            </div>
        </div>
    </div>
</div>
