<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Customers Management</h4>
        <button class="btn btn-teal" data-bs-toggle="modal" data-bs-target="#customerModal" id="btn-add-customer">
            <i class="fas fa-user-plus me-2"></i>Add Customer
        </button>
    </div>

    <!-- Customers Table -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table id="customersTable" class="table table-hover align-middle w-100">
                    <thead class="table-light">
                        <tr>
                            <th>Customer Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Outstanding Balance</th>
                            <th>Loyalty Points</th>
                            <th>Last Visit</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- DataTable Content -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Customer Modal -->
<div class="modal fade" id="customerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold" id="customerModalLabel">Add New Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <form id="customerForm">
                    <input type="hidden" name="id" id="customer-id">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Full Name</label>
                            <input type="text" name="name" class="form-control" required placeholder="e.g. John Doe">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" placeholder="e.g. +1 234 567 890">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="e.g. john@example.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Initial Balance</label>
                            <div class="input-group">
                                <input type="number" step="0.01" name="balance" class="form-control" value="0.00">
                                <span class="input-group-text currency-symbol">$</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Loyalty Points</label>
                            <input type="number" name="loyalty_points" class="form-control" value="0">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="customerForm" class="btn btn-teal px-4">Save Customer</button>
            </div>
        </div>
    </div>
</div>

<!-- Purchase History Modal -->
<div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold">Purchase History: <span id="historyCustomerName"
                        class="text-teal"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle w-100" id="historyTable">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Ref #</th>
                                <th>Total</th>
                                <th>Payment</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <!-- History items will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Settle Debt Modal -->
<div class="modal fade" id="settleDebtModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-bottom-0 p-4">
                <h5 class="modal-title fw-bold">Settle Customer Debt</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 pt-0">
                <form id="settleDebtForm">
                    <input type="hidden" name="customer_id" id="debt-customer-id">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Customer</label>
                        <input type="text" id="debt-customer-name" class="form-control bg-light" readonly>
                    </div>
                    <div
                        class="mb-3 bg-danger-subtle text-danger p-3 rounded-3 d-flex justify-content-between align-items-center">
                        <span class="fw-semibold">Current Debt:</span>
                        <h5 class="fw-bold mb-0" id="debt-current-balance">0.00 $</h5>
                    </div>
                    <hr>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Payment Amount <span
                                    class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="number" step="0.01" min="0.01" name="amount" id="debt-payment-amount"
                                    class="form-control" required>
                                <span class="input-group-text currency-symbol">$</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Payment Method</label>
                            <select name="payment_method" class="form-select">
                                <option value="Cash">Cash</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                                <option value="Cheque">Cheque</option>
                                <option value="Card">Card</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Notes / Reference</label>
                            <input type="text" name="notes" class="form-control" placeholder="e.g. Receipt #123456">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 p-4">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="settleDebtForm" class="btn btn-teal px-4 text-white">Record Payment</button>
            </div>
        </div>
    </div>
</div>
